services:
  codex-wrapper:
    init: true
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_UID: ${HOST_UID:-1000}
        CODEX_GID: ${HOST_GID:-1000}
    restart: unless-stopped
    image: codex-wrapper:latest
    env_file:
      - .env
    environment:
      CODEX_HOME: /home/codex/.codex
      CODEX_WORKDIR: /workspace/default
      CODEX_PATH: codex
      CODEX_APPROVAL_POLICY: ${CODEX_APPROVAL_POLICY:-never}
      CODEX_SANDBOX_MODE: ${CODEX_SANDBOX_MODE:-workspace-write}
      CODEX_ALLOW_DANGER_FULL_ACCESS: ${CODEX_ALLOW_DANGER_FULL_ACCESS:-0}
    security_opt:
      - seccomp=unconfined
      # On AppArmor-enabled Linux hosts, Codex Linux sandbox may also require:
      # - apparmor=unconfined
    ports:
      - "8020:8000"
    volumes:
      - ${HOME}/.codex:/home/codex/.codex
      - codex-workspace:/workspace

volumes:
  codex-workspace:
